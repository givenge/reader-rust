<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#c97f3a" />
    <title>阅读 - 离线</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f6efe6;
        color: #2d241b;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .card {
        width: min(420px, calc(100vw - 32px));
        background: rgba(255,255,255,0.88);
        border-radius: 24px;
        padding: 28px 24px;
        box-shadow: 0 12px 36px rgba(0,0,0,0.08);
        text-align: center;
      }
      h1 { margin: 0 0 10px; font-size: 24px; }
      p { margin: 0; line-height: 1.7; opacity: 0.75; }
      .meta { margin-top: 14px; font-size: 14px; color: #8b5f2d; }
      .actions { margin-top: 20px; display: flex; justify-content: center; }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 180px;
        height: 44px;
        padding: 0 18px;
        border-radius: 999px;
        background: #c97f3a;
        color: #fff;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>当前处于离线状态</h1>
      <p id="desc">应用外壳已缓存。已缓存到浏览器的章节仍可继续阅读，恢复联网后会自动获取最新内容。</p>
      <div id="meta" class="meta" hidden></div>
      <div class="actions">
        <a id="entry" class="btn" href="./#/reader">打开阅读页</a>
      </div>
    </div>
    <script>
      try {
        const raw = localStorage.getItem('reader-last-session')
        if (raw) {
          const session = JSON.parse(raw)
          const bookName = session?.book?.name || '最近阅读'
          const chapter = session?.chapters?.[session?.currentIndex || 0]?.title || session?.book?.durChapterTitle || ''
          const meta = document.getElementById('meta')
          const desc = document.getElementById('desc')
          if (meta) {
            meta.hidden = false
            meta.textContent = chapter ? `最近阅读：${bookName} / ${chapter}` : `最近阅读：${bookName}`
          }
          if (desc) {
            desc.textContent = '检测到本地最近阅读记录。若对应章节已缓存到浏览器，可直接恢复阅读。'
          }
        } else {
          const entry = document.getElementById('entry')
          if (entry) entry.setAttribute('href', './#/')
        }
      } catch (_) {}
    </script>
  </body>
  </html>
