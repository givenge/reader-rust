<svg xmlns="http://www.w3.org/2000/svg" width="200" height="60" viewBox="0 0 200 60">
  <!-- 背景圆角矩形 -->
  <rect x="0" y="0" width="200" height="60" rx="10" ry="10" fill="#f5f5f5"/>

  <!-- 图标部分：打开的书 -->
  <g transform="translate(10,10)">
    <path d="M0,0 L20,0 L20,40 L0,40 Z" fill="#ff6f61" stroke="#e55b50" stroke-width="2"/>
    <line x1="5" y1="5" x2="15" y2="5" stroke="#fff" stroke-width="2"/>
    <line x1="5" y1="10" x2="15" y2="10" stroke="#fff" stroke-width="2"/>
    <line x1="5" y1="15" x2="15" y2="15" stroke="#fff" stroke-width="2"/>
  </g>

  <!-- 网站名称 -->
  <text x="50" y="35" font-family="Arial, sans-serif" font-size="24" fill="#333">阅读</text>
</svg>