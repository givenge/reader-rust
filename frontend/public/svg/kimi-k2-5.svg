<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- 渐变背景 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <!-- 书本阴影 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- 圆形背景 -->
  <circle cx="100" cy="100" r="90" fill="url(#bgGrad)"/>
  <!-- 打开的书本 -->
  <g transform="translate(100, 100)" filter="url(#shadow)">
    <!-- 左页 -->
    <path d="M-55 -20 Q-30 -35 0 -25 L0 55 Q-30 45 -55 55 Z" fill="#fff8f0"/>
    <!-- 右页 -->
    <path d="M55 -20 Q30 -35 0 -25 L0 55 Q30 45 55 55 Z" fill="#fff8f0"/>
    <!-- 书脊 -->
    <path d="M-3 -25 L3 -25 L3 55 L-3 55 Z" fill="#e8ddd4"/>
    <!-- 左页线条 -->
    <line x1="-45" y1="-5" x2="-15" y2="-12" stroke="#d4c4b0" stroke-width="2" stroke-linecap="round"/>
    <line x1="-45" y1="10" x2="-10" y2="5" stroke="#d4c4b0" stroke-width="2" stroke-linecap="round"/>
    <line x1="-45" y1="25" x2="-10" y2="20" stroke="#d4c4b0" stroke-width="2" stroke-linecap="round"/>
    <line x1="-45" y1="40" x2="-15" y2="35" stroke="#d4c4b0" stroke-width="2" stroke-linecap="round"/>
    <!-- 右页线条 -->
    <line x1="45" y1="-5" x2="15" y2="-12" stroke="#d4c4b0" stroke-width="2" stroke-linecap="round"/>
    <line x1="45" y1="10" x2="10" y2="5" stroke="#d4c4b0" stroke-width="2" stroke-linecap="round"/>
    <line x1="45" y1="25" x2="10" y2="20" stroke="#d4c4b0" stroke-width="2" stroke-linecap="round"/>
    <line x1="45" y1="40" x2="15" y2="35" stroke="#d4c4b0" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- 中文"阅"字艺术化 -->
  <g transform="translate(100, 100)" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- 门字框 -->
    <path d="M-25 -45 L-25 15 Q-25 25 -15 25 L15 25 Q25 25 25 15 L25 -45" stroke-width="5"/>
    <!-- 兑字 -->
    <line x1="-15" y1="-25" x2="15" y2="-25"/>
    <line x1="0" y1="-45" x2="0" y2="-5"/>
    <path d="M-12 -5 Q0 5 12 -5"/>
    <line x1="-18" y1="5" x2="-8" y2="15"/>
    <line x1="18" y1="5" x2="8" y2="15"/>
    <line x1="-12" y1="10" x2="12" y2="10"/>
  </g>
  <!-- 装饰性小点 -->
  <circle cx="160" cy="50" r="6" fill="#fff" opacity="0.6"/>
  <circle cx="175" cy="70" r="4" fill="#fff" opacity="0.4"/>
</svg>
