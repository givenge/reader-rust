<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 定义渐变色 -->
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <!-- 定义阴影滤镜 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge> 
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/> 
      </feMerge>
    </filter>
  </defs>
  <!-- 背景圆角矩形 (可选，如果不需要背景可删除) -->
  <!-- <rect x="0" y="0" width="400" height="120" rx="20" fill="#f9f9f9"/> -->
  <!-- 图标部分：抽象的书本/眼睛 -->
  <g transform="translate(30, 30)" filter="url(#shadow)">
    <!-- 左侧书页 -->
    <path d="M20 10 C 5 10, 0 20, 0 35 C 0 50, 5 60, 20 60 L 30 60 L 30 10 Z" fill="url(#logoGradient)"/>
    <!-- 右侧书页 -->
    <path d="M30 10 L 30 60 L 40 60 C 55 60, 60 50, 60 35 C 60 20, 55 10, 40 10 Z" fill="url(#logoGradient)"/>
    <!-- 书脊/中间分割线 -->
    <rect x="28" y="10" width="4" height="50" fill="#ffffff" opacity="0.3"/>
    <!-- 装饰性的高光线条，增加立体感 -->
    <path d="M10 40 Q 20 35, 30 40" stroke="white" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M30 40 Q 40 35, 50 40" stroke="white" stroke-width="2" fill="none" opacity="0.6"/>
  </g>
  <!-- 文字部分 -->
  <text x="110" y="85" font-family="'Microsoft YaHei', 'SimHei', sans-serif" font-weight="bold" font-size="60" fill="#333333" letter-spacing="5">
    阅读
  </text>
  <!-- 英文副标题 (可选，增加设计感) -->
  <text x="115" y="105" font-family="Arial, sans-serif" font-weight="normal" font-size="14" fill="#888888" letter-spacing="2">
    NOVEL READING
  </text>
</svg>
